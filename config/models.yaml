# 模型配置文件
# 位置: config/models.yaml

# 默认配置
defaults:
  main: glm-5               # 主 Agent 默认模型
  embedding: zhipu-embedding

# 模型定义
models:
  # ============ glm-5 (智谱 GLM via Anthropic 兼容 API) ============
  - name: glm-5
    type: api
    provider: anthropic
    endpoint: ${ZHIPU_BASE_URL}
    apiKey: ${ZHIPU_API_KEY}
    maxTokens: 8192
    defaultTemperature: 0.7
    timeout: 60000
    capabilities:
      maxTokens: 8192
      supportsStreaming: true
      supportsVision: false
      supportsFunctionCalling: true
      quality: excellent
      speed: fast
      cost: low
    costPerMillionTokens: 0.5

  # ============ Claude Opus 4.6 (最强推理) ============
  - name: claude-opus-4-6
    type: api
    provider: anthropic
    endpoint: ${CLAUDE_BASE_URL}
    apiKey: ${CLAUDE_API_KEY}
    model: claude-opus-4-6
    maxTokens: 32768
    defaultTemperature: 0.7
    timeout: 120000
    capabilities:
      maxTokens: 32768
      supportsStreaming: true
      supportsVision: true
      supportsFunctionCalling: true
      quality: excellent
      speed: slow
      cost: high
    costPerMillionTokens: 15.0

  # ============ Claude Sonnet 4.6 (最佳编码) ============
  - name: claude-sonnet-4-6
    type: api
    provider: anthropic
    endpoint: ${CLAUDE_BASE_URL}
    apiKey: ${CLAUDE_API_KEY}
    model: claude-sonnet-4-6
    maxTokens: 16384
    defaultTemperature: 0.7
    timeout: 90000
    capabilities:
      maxTokens: 16384
      supportsStreaming: true
      supportsVision: true
      supportsFunctionCalling: true
      quality: excellent
      speed: fast
      cost: medium
    costPerMillionTokens: 3.0

  # ============ Claude Haiku 4.5 (轻量快速) ============
  - name: claude-haiku-4-5
    type: api
    provider: anthropic
    endpoint: ${CLAUDE_BASE_URL}
    apiKey: ${CLAUDE_API_KEY}
    model: claude-haiku-4-5-20251001
    maxTokens: 8192
    defaultTemperature: 0.7
    timeout: 60000
    capabilities:
      maxTokens: 8192
      supportsStreaming: true
      supportsVision: true
      supportsFunctionCalling: true
      quality: good
      speed: very-fast
      cost: low
    costPerMillionTokens: 0.25

  # ============ Zhipu Embedding (向量化专用) ============
  - name: zhipu-embedding
    type: api
    provider: zhipu
    endpoint: ${ZHIPU_EMBEDDING_ENDPOINT}
    apiKey: ${ZHIPU_EMBEDDING_API_KEY}
    model: embedding-3
    maxTokens: 512
    timeout: 30000
    capabilities:
      maxTokens: 512
      supportsStreaming: false
      supportsVision: false
      supportsFunctionCalling: false
      quality: excellent
      speed: fast
      cost: low
    costPerMillionTokens: 0.5

  # ============ MiniMax-M2.5 (minimax API) ============
  - name: MiniMax-M2.5
    type: api
    provider: anthropic-compatible
    endpoint: ${MINIMAX_BASE_URL}
    apiKey: ${MINIMAX_API_KEY}
    model: MiniMax-M2.5
    maxTokens: 8192
    defaultTemperature: 0.7
    timeout: 60000
    capabilities:
      maxTokens: 8192
      supportsStreaming: true
      supportsVision: false
      supportsFunctionCalling: true
      quality: good
      speed: fast
      cost: low
    costPerMillionTokens: 0.3
